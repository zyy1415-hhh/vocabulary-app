<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VocabLift · 填空背单词</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #06060f; --surface: #111125; --surface2: #1a1a35;
    --border: rgba(255,255,255,0.06);
    --purple: #a78bfa; --purple-dim: rgba(167,139,250,0.12);
    --green: #4ade80; --green-dim: rgba(74,222,128,0.10);
    --red: #f87171; --red-dim: rgba(248,113,113,0.10);
    --yellow: #facc15; --blue: #60a5fa;
    --text: #e2e8f0; --text-dim: #4a5568;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; -webkit-tap-highlight-color: transparent;
  }
  .app { max-width: 540px; margin: 0 auto; padding: 0 16px 100px; }

  /* Top Bar */
  .topbar {
    position: sticky; top: 0; z-index: 10;
    background: rgba(6,6,15,0.92); backdrop-filter: blur(18px);
    padding: 14px 0 10px; display: flex; align-items: center; justify-content: space-between;
  }
  .topbar .logo { font-size: 19px; font-weight: 800; letter-spacing: -0.3px; }
  .topbar .logo b { color: var(--purple); }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .days-badge {
    font-size: 12px; color: var(--yellow); background: rgba(250,204,21,0.08);
    padding: 3px 10px; border-radius: 20px; font-weight: 600;
  }

  /* Stats */
  .stats { display: flex; gap: 8px; margin: 14px 0 18px; }
  .stat { flex: 1; text-align: center; padding: 10px 2px; background: var(--surface); border-radius: 12px; border: 1px solid var(--border); }
  .stat .v { font-size: 19px; font-weight: 700; }
  .stat .l { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .stat-total .v { color: var(--purple); }
  .stat-due .v { color: var(--yellow); }
  .stat-done .v { color: var(--green); }

  /* Progress */
  .prog { margin-bottom: 18px; }
  .prog-top { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); margin-bottom: 5px; }
  .prog-track { height: 3px; background: var(--surface); border-radius: 4px; overflow: hidden; }
  .prog-fill { height: 100%; background: linear-gradient(90deg, var(--purple), #c084fc); border-radius: 4px; transition: width 0.4s; }

  /* Card */
  .card-area { margin-bottom: 18px; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 28px 22px; min-height: 270px;
    display: flex; flex-direction: column; justify-content: center;
    position: relative; overflow: hidden; cursor: pointer;
    transition: transform 0.15s; user-select: none;
  }
  .card:active { transform: scale(0.985); }

  .card-deco { position: absolute; right: -20px; top: -20px; font-size: 100px; font-weight: 900; color: rgba(167,139,250,0.03); pointer-events: none; font-family: Georgia, serif; }

  /* Front */
  .hint-label { font-size: 11px; font-weight: 700; color: var(--purple); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
  .sentence { font-size: 19px; line-height: 1.75; color: var(--text); margin-bottom: 16px; }
  .blank { display: inline; border-bottom: 2px dashed var(--purple); color: var(--purple); font-weight: 600; padding: 0 2px; }
  .hint-box { background: var(--purple-dim); border-radius: 10px; padding: 11px 14px; margin-top: 4px; }
  .hint-box .hl { font-size: 11px; color: var(--purple); font-weight: 700; margin-bottom: 3px; }
  .hint-box .hm { font-size: 14px; color: var(--text); }
  .sentence-nav { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
  .sentence-nav .s-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.1); }
  .sentence-nav .s-dot.active { background: var(--purple); }
  .sentence-nav .s-dot.done { background: var(--green); }
  .sentence-nav .s-label { font-size: 11px; color: var(--text-dim); margin-left: auto; }
  .tap-hint { text-align: center; color: var(--text-dim); font-size: 12px; margin-top: 18px; }

  /* Back */
  .aw { font-size: 30px; font-weight: 800; color: var(--green); margin-bottom: 2px; }
  .aph { font-size: 14px; color: var(--text-dim); margin-bottom: 14px; }
  .asent { font-size: 17px; line-height: 1.7; color: var(--text); padding: 14px; background: rgba(255,255,255,0.02); border-radius: 12px; margin-bottom: 12px; }
  .asent .filled { background: var(--green-dim); color: var(--green); font-weight: 700; padding: 0 4px; border-radius: 3px; }
  .amean { font-size: 13px; color: var(--text-dim); line-height: 1.6; padding-top: 10px; border-top: 1px solid var(--border); }

  .speak-btn {
    position: absolute; top: 14px; right: 14px;
    background: var(--purple-dim); border: none; color: var(--purple);
    width: 34px; height: 34px; border-radius: 50%; display: flex;
    align-items: center; justify-content: center; cursor: pointer; font-size: 15px;
  }

  /* Judge */
  .judge-row { display: flex; gap: 12px; margin-top: 2px; }
  .judge-btn {
    flex: 1; padding: 15px; border: none; border-radius: 14px;
    font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.12s;
  }
  .judge-btn:active { transform: scale(0.96); }
  .btn-hard { background: var(--red-dim); color: var(--red); }
  .btn-good { background: var(--green-dim); color: var(--green); }

  /* Complete */
  .complete { text-align: center; padding: 44px 16px; }
  .complete .em { font-size: 50px; margin-bottom: 14px; }
  .complete h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .complete p { color: var(--text-dim); font-size: 13px; margin-bottom: 20px; }
  .complete .btn-rst {
    background: var(--purple-dim); color: var(--purple); border: none;
    padding: 11px 28px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer;
  }

  /* Nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(6,6,15,0.95); backdrop-filter: blur(18px);
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-around;
    padding: 7px 0 max(7px, env(safe-area-inset-bottom));
    max-width: 540px; margin: 0 auto; left: 50%; transform: translateX(-50%);
  }
  .nav-item {
    background: none; border: none; color: var(--text-dim);
    display: flex; flex-direction: column; align-items: center; gap: 1px;
    padding: 5px 18px; border-radius: 10px; cursor: pointer;
    font-size: 10px; font-weight: 500; transition: color 0.2s; position: relative;
  }
  .nav-item.active { color: var(--purple); }
  .nav-item svg { width: 21px; height: 21px; }
  .nav-badge {
    position: absolute; top: 1px; right: 10px; background: var(--red);
    color: #fff; font-size: 9px; min-width: 14px; height: 14px;
    border-radius: 7px; display: flex; align-items: center; justify-content: center; padding: 0 3px;
  }

  /* Pages */
  .page { display: none; }
  .page.active { display: block; }

  /* Word List */
  .phdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .phdr h2 { font-size: 17px; font-weight: 700; }
  .btn-add {
    background: var(--purple); color: #fff; border: none;
    padding: 7px 14px; border-radius: 9px; font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .wl-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 13px 14px; margin-bottom: 7px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .wl-l .wl-w { font-size: 14px; font-weight: 700; }
  .wl-l .wl-p { font-size: 11px; color: var(--text-dim); margin-left: 5px; }
  .wl-l .wl-m { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .wl-r { display: flex; align-items: center; gap: 7px; }
  .wl-lv { font-size: 10px; padding: 2px 7px; border-radius: 5px; font-weight: 700; }
  .lv-0 { background: var(--purple-dim); color: var(--purple); }
  .lv-1 { background: rgba(250,204,21,0.10); color: var(--yellow); }
  .lv-2 { background: var(--green-dim); color: var(--green); }
  .wl-del { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 15px; padding: 2px 4px; }
  .wl-del:hover { color: var(--red); }
  .empty { text-align: center; padding: 50px 16px; color: var(--text-dim); }
  .empty .ic { font-size: 42px; margin-bottom: 10px; }

  /* Modal Overlay */
  .modal-ov {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.65); align-items: center; justify-content: center; padding: 16px;
  }
  .modal-ov.show { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 22px; width: 100%; max-width: 440px;
    max-height: 85vh; overflow-y: auto;
  }
  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 14px; }
  .modal label { display: block; font-size: 11px; font-weight: 700; color: var(--text-dim); margin-bottom: 4px; margin-top: 10px; }
  .modal input, .modal textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 9px; padding: 10px 12px; color: var(--text);
    font-size: 14px; outline: none; font-family: inherit;
  }
  .modal input:focus, .modal textarea:focus { border-color: var(--purple); }
  .modal textarea { min-height: 60px; resize: vertical; }
  .modal .hint { font-size: 10px; color: var(--text-dim); margin-top: 3px; line-height: 1.5; }
  .modal-btns { display: flex; gap: 9px; margin-top: 16px; }
  .modal-btns button {
    flex: 1; padding: 11px; border: none; border-radius: 10px;
    font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .mb-cancel { background: var(--bg); color: var(--text-dim); }
  .mb-submit { background: var(--purple); color: #fff; }

  /* Import Modal Extra */
  .import-area {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px; color: var(--text);
    font-size: 13px; font-family: inherit; outline: none;
    min-height: 140px; resize: vertical; line-height: 1.6;
  }
  .import-area:focus { border-color: var(--purple); }
  .import-format {
    background: var(--bg); border-radius: 10px; padding: 12px; margin-top: 10px;
    font-size: 11px; color: var(--text-dim); line-height: 1.7;
  }
  .import-format code { color: var(--purple); background: rgba(167,139,250,0.1); padding: 0 4px; border-radius: 3px; font-size: 11px; }
  .import-msg { font-size: 12px; margin-top: 8px; padding: 8px 12px; border-radius: 8px; display: none; }
  .import-msg.ok { display: block; background: var(--green-dim); color: var(--green); }
  .import-msg.err { display: block; background: var(--red-dim); color: var(--red); }

  /* Animations */
  @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
  .fade-up { animation: fadeUp 0.28s ease-out; }
  @keyframes slideOutL { to { opacity:0; transform:translateX(-30px) scale(0.96); } }
  @keyframes slideOutR { to { opacity:0; transform:translateX(30px) scale(0.96); } }
  .slide-out-l { animation: slideOutL 0.18s ease-in forwards; }
  .slide-out-r { animation: slideOutR 0.18s ease-in forwards; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="logo"><b>V</b>ocabLift</div>
    <div class="topbar-right">
      <span class="days-badge" id="streakBadge">🔥 0天</span>
    </div>
  </div>

  <div class="stats">
    <div class="stat stat-total"><div class="v" id="statTotal">0</div><div class="l">词库</div></div>
    <div class="stat stat-due"><div class="v" id="statDue">0</div><div class="l">待复习</div></div>
    <div class="stat stat-done"><div class="v" id="statDone">0</div><div class="l">今日完成</div></div>
  </div>

  <!-- Card Page -->
  <div class="page active" id="pageCard">
    <div class="prog">
      <div class="prog-top"><span id="progLabel">进度</span><span id="progFrac">0/0</span></div>
      <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0"></div></div>
    </div>
    <div id="cardArea"></div>
    <div class="judge-row" id="judgeRow" style="display:none;">
      <button class="judge-btn btn-hard" onclick="judge(false)">😅 没想起来</button>
      <button class="judge-btn btn-good" onclick="judge(true)">😎 记住了</button>
    </div>
    <div id="completeArea"></div>
  </div>

  <!-- Review Page -->
  <div class="page" id="pageReview">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:24px;text-align:center;margin-bottom:16px;">
      <div style="font-size:48px;font-weight:900;color:var(--yellow);line-height:1;" id="reviewNum">0</div>
      <div style="color:var(--text-dim);font-size:13px;margin-top:4px;">个单词今天需要复习</div>
      <button style="margin-top:14px;width:100%;padding:14px;border:none;border-radius:13px;background:linear-gradient(135deg,var(--purple),#c084fc);color:#fff;font-size:15px;font-weight:700;cursor:pointer;" onclick="startReview()">开始复习 ✏️</button>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;" id="calArea"></div>
  </div>

  <!-- List Page -->
  <div class="page" id="pageList">
    <div class="phdr">
      <h2>我的词库</h2>
      <div style="display:flex;gap:8px;">
        <button class="btn-add" style="background:rgba(255,255,255,0.06);color:var(--text-dim);" onclick="showImport()">📥 导入</button>
        <button class="btn-add" onclick="showAdd()">＋ 添加</button>
      </div>
    </div>
    <div id="listArea"></div>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <button class="nav-item active" onclick="goPage('card',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="3"/><path d="M8 10h8M8 14h5"/></svg>
    背单词
  </button>
  <button class="nav-item" onclick="goPage('review',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
    复习
    <span class="nav-badge" id="reviewBadge" style="display:none;">0</span>
  </button>
  <button class="nav-item" onclick="goPage('list',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
    词库
  </button>
</nav>

<!-- Add Word Modal -->
<div class="modal-ov" id="addModal">
  <div class="modal">
    <h3>添加新单词</h3>
    <label>英文单词</label>
    <input type="text" id="inpWord" placeholder="achieve">
    <label>音标（可选）</label>
    <input type="text" id="inpPhonetic" placeholder="/əˈtʃiːv/">
    <label>中文释义</label>
    <input type="text" id="inpMeaning" placeholder="实现，达到，完成">
    <label>例句（把目标单词用 {{}} 包起来）</label>
    <textarea id="inpSent1" placeholder="She finally {{achieved}} her dream of becoming a doctor."></textarea>
    <label>例句2（可选）</label>
    <textarea id="inpSent2" placeholder="The team {{achieved}} excellent results this quarter."></textarea>
    <div class="modal-btns">
      <button class="mb-cancel" onclick="hideAdd()">取消</button>
      <button class="mb-submit" onclick="submitAdd()">添加</button>
    </div>
  </div>
</div>

<!-- Import Modal -->
<div class="modal-ov" id="importModal">
  <div class="modal">
    <h3>批量导入单词</h3>
    <label>粘贴单词数据</label>
    <textarea class="import-area" id="importArea" placeholder="粘贴到这里..."></textarea>
    <div class="import-format">
      <b>格式（每行一个单词）：</b><br>
      <code>单词 | 中文释义 | 例句（用{{}}包住单词） | 例句2（可选）</code><br><br>
      <b>示例：</b><br>
      <code>achieve | 实现，达到 | She finally {{achieve}} her dream. | They {{achieve}} great success.</code><br><br>
      也支持直接粘贴 <code>单词 | 释义 | 例句</code> 格式，系统会自动识别。
    </div>
    <div class="import-msg" id="importMsg"></div>
    <div class="modal-btns">
      <button class="mb-cancel" onclick="hideImport()">取消</button>
      <button class="mb-submit" onclick="doImport()">导入</button>
    </div>
  </div>
</div>

<script>
// ============ Built-in B1-B2 Words ============
const BUILTIN = [
  { w:"achieve", p:"/əˈtʃiːv/", m:"实现，达到，完成",
    s:["She finally {{achieve}} her dream of becoming a doctor.","The team {{achieve}} excellent results every year."] },
  { w:"affect", p:"/əˈfekt/", m:"影响，使改变",
    s:["Climate change will {{affect}} everyone on Earth.","His speech deeply {{affect}} the audience."] },
  { w:"afford", p:"/əˈfɔːd/", m:"买得起，承担得起",
    s:["I can't {{afford}} a new phone right now.","They finally {{afford}} to buy a house."] },
  { w:"argue", p:"/ˈɑːɡ.juː/", m:"争论，争吵；主张",
    s:["They often {{argue}} about politics at dinner.","She {{argue}} that education should be free."] },
  { w:"avoid", p:"/əˈvɔɪd/", m:"避免，躲避",
    s:["You should {{avoid}} eating too much sugar.","He tried to {{avoid}} answering the question."] },
  { w:"believe", p:"/bɪˈliːv/", m:"相信，认为",
    s:["I {{believe}} that hard work pays off.","Many people {{believe}} in life after death."] },
  { w:"challenge", p:"/ˈtʃæl.ɪndʒ/", m:"挑战；质疑",
    s:["Climbing the mountain was a real {{challenge}}.","She {{challenge}} the decision in court."] },
  { w:"communicate", p:"/kəˈmjuː.nɪ.keɪt/", m:"沟通，交流",
    s:["We use email to {{communicate}} with clients.","Babies {{communicate}} by crying and smiling."] },
  { w:"compare", p:"/kəmˈpeə/", m:"比较，对比",
    s:["It's hard to {{compare}} the two cities.","Please {{compare}} these two products."] },
  { w:"compete", p:"/kəmˈpiːt/", m:"竞争，比赛",
    s:["Five teams will {{compete}} in the finals.","She loves to {{compete}} in chess tournaments."] },
  { w:"concentrate", p:"/ˈkɒn.sən.treɪt/", m:"专心，集中注意力",
    s:["I can't {{concentrate}} with all this noise.","Please {{concentrate}} on your work."] },
  { w:"confident", p:"/ˈkɒn.fɪ.dənt/", m:"自信的，有信心的",
    s:["She feels {{confident}} about the interview.","He gave a {{confident}} speech."] },
  { w:"consider", p:"/kənˈsɪd.ər/", m:"考虑，认为",
    s:["Please {{consider}} my suggestion carefully.","I {{consider}} him a close friend."] },
  { w:"decide", p:"/dɪˈsaɪd/", m:"决定，做出抉择",
    s:["We need to {{decide}} by tomorrow.","She {{decide}} to study abroad."] },
  { w:"develop", p:"/dɪˈvel.əp/", m:"发展，开发，患（病）",
    s:["Children {{develop}} at different speeds.","The company plans to {{develop}} a new app."] },
  { w:"discuss", p:"/dɪˈskʌs/", m:"讨论，商议",
    s:["We need to {{discuss}} this problem together.","They {{discuss}} the plan for hours."] },
  { w:"encourage", p:"/ɪnˈkʌr.ɪdʒ/", m:"鼓励，激励",
    s:["Parents should {{encourage}} their children.","The teacher always {{encourage}} us."] },
  { w:"exam", p:"/ɪɡˈzæm/", m:"考试，测验",
    s:["I have a math {{exam}} next week.","She passed all her {{exam}}s."] },
  { w:"exercise", p:"/ˈek.sə.saɪz/", m:"运动，锻炼；练习",
    s:["You should {{exercise}} at least three times a week.","Do the {{exercise}} on page 42."] },
  { w:"expect", p:"/ɪkˈspekt/", m:"期待，预料",
    s:["I {{expect}} to finish by Friday.","Don't {{expect}} too much from him."] },
  { w:"experience", p:"/ɪkˈspɪə.ri.əns/", m:"经验；经历",
    s:["She has a lot of work {{experience}}.","That was an amazing {{experience}}."] },
  { w:"familiar", p:"/fəˈmɪl.i.ər/", m:"熟悉的，通晓的",
    s:["The song sounds very {{familiar}}.","Are you {{familiar}} with this software?"] },
  { w:"imagine", p:"/ɪˈmædʒ.ɪn/", m:"想象，设想",
    s:["Can you {{imagine}} life without electricity?","I can't {{imagine}} losing my job."] },
  { w:"improve", p:"/ɪmˈpruːv/", m:"改善，提高",
    s:["We need to {{improve}} our service.","Her English has {{improve}}d a lot."] },
  { w:"include", p:"/ɪnˈkluːd/", m:"包括，包含",
    s:["The price does not {{include}} tax.","The tour {{include}} a free lunch."] },

// ============ Data Model ============
// Word: { id, word, phonetic, meaning, sentences:[], level, interval, ease, reps, nextReview }

function mkWordEntry(w, p, m, sentences) {
  return {
    id: Date.now() * 1000 + Math.floor(Math.random()*1000),
    word: w.toLowerCase(),
    phonetic: p || '',
    meaning: m,
    sentences: sentences || [],
    level: 0, interval: 0, ease: 2.5, reps: 0,
    nextReview: todayStr(), lastReview: null,
  };
}

function loadWords() {
  const saved = localStorage.getItem('vl_words');
  if (saved) return JSON.parse(saved);
  return BUILTIN.map(b => mkWordEntry(b.w, b.p, b.m, b.s));
}

function saveWords() { localStorage.setItem('vl_words', JSON.stringify(words)); }
function todayStr() { return new Date().toISOString().split('T')[0]; }

// ============ SRS ============
function schedule(w, rem) {
  if (rem) {
    w.reps += 1;
    if (w.reps === 1) w.interval = 1;
    else if (w.reps === 2) w.interval = 3;
    else w.interval = Math.round(w.interval * w.ease);
    w.ease = Math.max(1.3, w.ease + 0.1);
    w.level = Math.min(2, w.level + 1);
  } else {
    w.reps = 0; w.interval = 0;
    w.ease = Math.max(1.3, w.ease - 0.2);
    w.level = 0;
  }
  const d = new Date(); d.setDate(d.getDate() + w.interval);
  w.nextReview = d.toISOString().split('T')[0];
  w.lastReview = todayStr();
  return w;
}

// ============ State ============
let words = loadWords();
let queue = [];
let qi = 0;       // queue index
let sentIdx = 0;  // sentence index within current word
let doneToday = 0;
let showingAnswer = false;

function getDue() { return words.filter(w => w.nextReview <= todayStr()); }

// ============ Render ============
function updateStats() {
  const due = getDue();
  document.getElementById('statTotal').textContent = words.length;
  document.getElementById('statDue').textContent = due.length;
  document.getElementById('statDone').textContent = doneToday;
  const badge = document.getElementById('reviewBadge');
  if (due.length > 0) { badge.style.display = 'flex'; badge.textContent = due.length; }
  else { badge.style.display = 'none'; }
  updateStreak();
}

function updateStreak() {
  let s = 0, d = new Date();
  for (let i = 0; i < 400; i++) {
    const ds = new Date(d); ds.setDate(ds.getDate() - i);
    const key = 'vl_log_' + ds.toISOString().split('T')[0];
    if (JSON.parse(localStorage.getItem(key)||'[]').length > 0) s++;
    else if (i > 0) break;
  }
  document.getElementById('streakBadge').textContent = '🔥 ' + s + '天';
}

function renderCard() {
  queue = getDue(); qi = 0; sentIdx = 0; showingAnswer = false;
  document.getElementById('judgeRow').style.display = 'none';
  document.getElementById('completeArea').innerHTML = '';

  if (queue.length === 0) {
    document.getElementById('cardArea').innerHTML = '';
    document.getElementById('completeArea').innerHTML = `
      <div class="complete fade-up">
        <div class="em">🎉</div>
        <h2>今天搞定啦！</h2>
        <p>已完成 ${doneToday} 个单词的复习</p>
        <button class="btn-rst" onclick="reviewAll()">🔄 复习全部词库</button>
      </div>`;
    updateProg();
    return;
  }
  renderCurrentCard();
}

function renderCurrentCard() {
  if (qi >= queue.length) { renderCard(); return; }
  const w = queue[qi];
  const totalS = w.sentences.length || 1;
  const area = document.getElementById('cardArea');

  if (!showingAnswer) {
    const blanked = blankSentence(w.sentences[sentIdx] || '', w.word);
    const dots = [];
    for (let i = 0; i < totalS; i++) {
      const cls = i < sentIdx ? 'active done' : i === sentIdx ? 'active' : '';
      dots.push(`<div class="s-dot ${cls}"></div>`);
    }
    area.innerHTML = `
      <div class="card fade-up" onclick="flipOrNext()">
        <div class="card-deco">?</div>
        <div class="hint-label">🧩 根据提示猜单词</div>
        <div class="sentence">${blanked}</div>
        <div class="hint-box">
          <div class="hl">中文提示</div>
          <div class="hm">${escH(w.meaning)}</div>
        </div>
        ${totalS > 1 ? `<div class="sentence-nav">${dots.join('')}<span class="s-label">${sentIdx+1}/${totalS} 例句</span></div>` : ''}
        <div class="tap-hint">👆 点击查看答案</div>
      </div>`;
  } else {
    const filled = fillSentence(w.sentences[sentIdx] || '', w.word);
    const dots = [];
    for (let i = 0; i < totalS; i++) {
      const cls = i <= sentIdx ? 'active done' : '';
      dots.push(`<div class="s-dot ${cls}"></div>`);
    }
    area.innerHTML = `
      <div class="card fade-up">
        <button class="speak-btn" onclick="event.stopPropagation();speak('${escS(w.word)}')">🔊</button>
        <div class="aw">${escH(w.word)}</div>
        ${w.phonetic ? '<div class="aph">'+escH(w.phonetic)+'</div>' : ''}
        <div class="asent">${filled}</div>
        ${sentIdx+1 < totalS ? `<button onclick="nextSentence()" style="width:100%;padding:10px;background:var(--purple-dim);color:var(--purple);border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:8px;">看下一个例句 →</button>` : ''}
        ${totalS > 1 ? `<div class="sentence-nav">${dots.join('')}<span class="s-label">${sentIdx+1}/${totalS} 例句</span></div>` : ''}
        <div class="amean">📖 ${escH(w.meaning)}</div>
      </div>`;
  }
  updateProg();
}

function flipOrNext() {
  if (showingAnswer) {
    // Already showing answer → go to next sentence or show judge
    const w = queue[qi];
    if (sentIdx + 1 < (w.sentences.length || 1)) {
      sentIdx++;
      renderCurrentCard();
    }
  } else {
    showingAnswer = true;
    renderCurrentCard();
    document.getElementById('judgeRow').style.display = 'flex';
  }
}

function nextSentence() {
  const w = queue[qi];
  if (sentIdx + 1 < (w.sentences.length || 0)) {
    sentIdx++;
    renderCurrentCard();
  }
}

function blankSentence(sent, word) {
  return sent.replace(/\{\{(\w+)\}\}/gi, '<span class="blank">________</span>');
}

function fillSentence(sent, word) {
  return sent.replace(/\{\{(\w+)\}\}/gi, '<span class="filled">$1</span>');
}

function updateProg() {
  const total = Math.max(queue.length, 1);
  const pct = Math.round(qi / total * 100);
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progFrac').textContent = `${Math.min(qi,total)}/${total}`;
}

function judge(rem) {
  const w = queue[qi];
  const wi = words.findIndex(x => x.id === w.id);
  if (wi === -1) return;
  words[wi] = schedule(words[wi], rem);
  saveWords();
  doneToday++;
  logToday(w.id);
  updateStats();

  const area = document.getElementById('cardArea');
  const card = area.querySelector('.card');
  if (card) {
    card.classList.add(rem ? 'slide-out-l' : 'slide-out-r');
    setTimeout(() => {
      qi++; sentIdx = 0; showingAnswer = false;
      if (qi >= queue.length) { renderCard(); }
      else {
        document.getElementById('judgeRow').style.display = 'none';
        renderCurrentCard();
      }
    }, 180);
  }
}

function logToday(id) {
  const ds = todayStr();
  const log = JSON.parse(localStorage.getItem('vl_log_' + ds) || '[]');
  log.push({ id });
  localStorage.setItem('vl_log_' + ds, JSON.stringify(log));
}

function reviewAll() {
  words.forEach(w => w.nextReview = todayStr());
  saveWords(); updateStats(); renderCard();
}

// ============ Pages ============
function goPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('page' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
  if (btn) btn.classList.add('active');
  if (name === 'card') renderCard();
  if (name === 'list') renderList();
  if (name === 'review') renderReview();
}

// ============ List ============
function renderList() {
  const area = document.getElementById('listArea');
  if (words.length === 0) {
    area.innerHTML = '<div class="empty"><div class="ic">📭</div>还没有单词，快去添加吧</div>';
    return;
  }
  let h = '';
  words.forEach(w => {
    const lv = ['<span class="wl-lv lv-0">新词</span>','<span class="wl-lv lv-1">学习中</span>','<span class="wl-lv lv-2">已掌握</span>'][w.level];
    h += `<div class="wl-item fade-up"><div class="wl-l"><span class="wl-w">${escH(w.word)}</span>${w.phonetic?`<span class="wl-p">${escH(w.phonetic)}</span>`:''}<div class="wl-m">${escH(w.meaning)}</div></div><div class="wl-r">${lv}<button class="wl-del" onclick="delWord(${w.id})">✕</button></div></div>`;
  });
  area.innerHTML = h;
}

function delWord(id) {
  if (!confirm('确定删除？')) return;
  words = words.filter(w => w.id !== id);
  saveWords(); updateStats(); renderList();
}

// ============ Add Modal ============
function showAdd() {
  document.getElementById('addModal').classList.add('show');
  document.getElementById('inpWord').focus();
}
function hideAdd() {
  document.getElementById('addModal').classList.remove('show');
  ['inpWord','inpPhonetic','inpMeaning','inpSent1','inpSent2'].forEach(id => document.getElementById(id).value = '');
}
function submitAdd() {
  const w = document.getElementById('inpWord').value.trim().toLowerCase();
  const p = document.getElementById('inpPhonetic').value.trim();
  const m = document.getElementById('inpMeaning').value.trim();
  const s1 = document.getElementById('inpSent1').value.trim();
  const s2 = document.getElementById('inpSent2').value.trim();
  if (!w || !m || !s1) { alert('请至少填写单词、释义和例句1'); return; }
  // Auto-wrap word in sentence if not wrapped
  const fix = s => s.replace(new RegExp('\\b'+escapeRegex(w)+'\\b','i'), '{{'+w+'}}');
  const sentArr = [];
  [s1,s2].forEach(s => { if(s) sentArr.push(fix(s)); });
  words.push(mkWordEntry(w, p, m, sentArr));
  saveWords(); updateStats(); hideAdd(); renderList();
  goPage('list', document.querySelectorAll('.nav-item')[2]);
}

// ============ Import Modal ============
function showImport() {
  document.getElementById('importModal').classList.add('show');
  document.getElementById('importArea').focus();
  document.getElementById('importMsg').className = 'import-msg';
  document.getElementById('importArea').value = '';
}
function hideImport() {
  document.getElementById('importModal').classList.remove('show');
}

function doImport() {
  const raw = document.getElementById('importArea').value.trim();
  const msg = document.getElementById('importMsg');
  if (!raw) { msg.className = 'import-msg err'; msg.textContent = '请粘贴单词数据'; return; }

  const lines = raw.split('\n').map(l => l.trim()).filter(l => l);
  let count = 0, errs = [];

  lines.forEach((line, li) => {
    // Try pipe format: word | meaning | sent1 | sent2
    const parts = line.split('|').map(p => p.trim()).filter(p => p);
    if (parts.length < 3) { errs.push(`第${li+1}行格式不正确`); return; }
    const w = parts[0].toLowerCase();
    const m = parts[1];
    const sentences = [];
    for (let i = 2; i < parts.length; i++) {
      let s = parts[i];
      // Auto-wrap if not wrapped
      if (s && !s.includes('{{')) {
        s = s.replace(new RegExp('\\b'+escapeRegex(w)+'\\b','i'), '{{'+w+'}}');
      }
      if (s) sentences.push(s);
    }
    if (!w || !m || sentences.length === 0) { errs.push(`第${li+1}行缺少必要信息`); return; }
    words.push(mkWordEntry(w, '', m, sentences));
    count++;
  });

  saveWords(); updateStats();
  if (errs.length > 0) {
    msg.className = 'import-msg err';
    msg.textContent = `成功导入 ${count} 个，失败 ${errs.length} 个。示例错误：${errs.slice(0,2).join('；')}`;
  } else {
    msg.className = 'import-msg ok';
    msg.textContent = `✅ 成功导入 ${count} 个单词！`;
    setTimeout(() => { hideImport(); renderList(); goPage('list', document.querySelectorAll('.nav-item')[2]); }, 800);
  }
}

// ============ Review Page ============
function renderReview() {
  document.getElementById('reviewNum').textContent = getDue().length;
  renderCal();
}
function renderCal() {
  const area = document.getElementById('calArea');
  const dns = ['日','一','二','三','四','五','六'];
  let h = '<div style="font-size:13px;font-weight:600;margin-bottom:10px;">📅 学习记录</div>';
  h += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center;">';
  dns.forEach(d => h += `<div style="font-size:10px;color:var(--text-dim);padding:3px;">${d}</div>`);
  const today = new Date();
  for (let i = 27; i >= 0; i--) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    const ds = d.toISOString().split('T')[0];
    const log = JSON.parse(localStorage.getItem('vl_log_' + ds) || '[]');
    const isToday = ds === todayStr();
    const cls = log.length > 0 ? 'background:var(--green-dim);color:var(--green);font-weight:700;' : '';
    const tCls = isToday ? 'border:1px solid var(--purple);' : '';
    h += `<div style="aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;${cls}${tCls}">${d.getDate()}</div>`;
  }
  h += '</div>';
  area.innerHTML = h;
}
function startReview() { goPage('card', document.querySelectorAll('.nav-item')[0]); }

// ============ TTS ============
function speak(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.82;
  window.speechSynthesis.speak(u);
}

// ============ Utils ============
function escS(s) { return s.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
function escR(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function escH(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ============ Keyboard ============
document.addEventListener('keydown', e => {
  if (document.getElementById('addModal').classList.contains('show')) {
    if (e.key === 'Escape') hideAdd();
    if (e.key === 'Enter' && e.ctrlKey) submitAdd();
    return;
  }
  if (document.getElementById('importModal').classList.contains('show')) {
    if (e.key === 'Escape') hideImport();
    return;
  }
  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    if (!showingAnswer) flipOrNext();
  }
  if (e.key === 'ArrowLeft' || e.key === 'a') { e.preventDefault(); judge(false); }
  if (e.key === 'ArrowRight' || e.key === 'd') { e.preventDefault(); judge(true); }
  if (e.key === 'n' && showingAnswer) nextSentence();
});

// ============ Init ============
updateStats();
renderCard();
</script>
