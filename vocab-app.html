<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VocabLift</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a1a;--surface:#141428;--border:rgba(255,255,255,.07);--purple:#a78bfa;--pdim:rgba(167,139,250,.13);--green:#4ade80;--gdim:rgba(74,222,128,.11);--red:#f87171;--rdim:rgba(248,113,113,.11);--yellow:#facc15;--text:#e2e8f0;--dim:#64748b}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent}
.app{max-width:520px;margin:0 auto;padding:0 16px 100px}
.topbar{position:sticky;top:0;z-index:10;background:rgba(10,10,26,.92);backdrop-filter:blur(18px);padding:14px 0 10px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:20px;font-weight:800;letter-spacing:-.4px}.logo b{color:var(--purple)}
.streak{font-size:12px;color:var(--yellow);background:rgba(250,204,21,.08);padding:3px 10px;border-radius:20px;font-weight:600}
.stats{display:flex;gap:8px;margin:14px 0 18px}
.stat{flex:1;text-align:center;padding:10px 4px;background:var(--surface);border-radius:12px;border:1px solid var(--border)}
.stat .v{font-size:20px;font-weight:700}.stat .l{font-size:11px;color:var(--dim);margin-top:2px}
.s-total .v{color:var(--purple)}.s-due .v{color:var(--yellow)}.s-done .v{color:var(--green)}
.prog{margin-bottom:18px}.prog-top{display:flex;justify-content:space-between;font-size:11px;color:var(--dim);margin-bottom:5px}
.prog-track{height:3px;background:var(--surface);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--purple),#c084fc);border-radius:4px;transition:width .4s}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px 22px;min-height:260px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden;cursor:pointer;transition:transform .15s;user-select:none;margin-bottom:18px}
.card:active{transform:scale(.985)}
.card-deco{position:absolute;right:-24px;top:-24px;font-size:110px;font-weight:900;color:rgba(167,139,250,.03);pointer-events:none;font-family:Georgia,serif}
.hint-label{font-size:11px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
.sentence{font-size:19px;line-height:1.75;color:var(--text);margin-bottom:16px}
.blank{display:inline;border-bottom:2px dashed var(--purple);color:var(--purple);font-weight:600;padding:0 2px}
.hint-box{background:var(--pdim);border-radius:10px;padding:11px 14px;margin-top:4px}
.hint-box .hl{font-size:11px;color:var(--purple);font-weight:700;margin-bottom:3px}
.hint-box .hm{font-size:14px;color:var(--text)}
.sent-nav{display:flex;align-items:center;gap:6px;margin-top:12px}
.s-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.1);transition:background .2s}
.s-dot.act{background:var(--purple)}.s-nav-label{font-size:11px;color:var(--dim);margin-left:auto}
.tap-hint{text-align:center;color:var(--dim);font-size:12px;margin-top:18px}
.aw{font-size:30px;font-weight:800;color:var(--green);margin-bottom:2px}
.aph{font-size:14px;color:var(--dim);margin-bottom:14px}
.asent{font-size:17px;line-height:1.7;color:var(--text);padding:14px;background:rgba(255,255,255,.02);border-radius:12px;margin-bottom:12px}
.asent .filled{background:var(--gdim);color:var(--green);font-weight:700;padding:0 5px;border-radius:4px}
.amean{font-size:13px;color:var(--dim);line-height:1.6;padding-top:10px;border-top:1px solid var(--border)}
.speak-btn{position:absolute;top:14px;right:14px;background:var(--pdim);border:none;color:var(--purple);width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px}
.btn-next-sent{width:100%;padding:10px;background:var(--pdim);color:var(--purple);border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:8px}
.judge-row{display:flex;gap:12px;margin-top:2px}
.judge-btn{flex:1;padding:15px;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;transition:all .12s}
.judge-btn:active{transform:scale(.96)}
.btn-hard{background:var(--rdim);color:var(--red)}.btn-good{background:var(--gdim);color:var(--green)}
.complete{text-align:center;padding:44px 16px}
.complete .em{font-size:50px;margin-bottom:14px}.complete h2{font-size:20px;font-weight:700;margin-bottom:6px}
.complete p{color:var(--dim);font-size:13px;margin-bottom:20px}
.complete .btn-rst{background:var(--pdim);color:var(--purple);border:none;padding:11px 28px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);background:rgba(10,10,26,.95);backdrop-filter:blur(18px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:7px 0 max(7px,env(safe-area-inset-bottom));width:100%;max-width:520px}
.nav-item{background:none;border:none;color:var(--dim);display:flex;flex-direction:column;align-items:center;gap:1px;padding:5px 18px;border-radius:10px;cursor:pointer;font-size:10px;font-weight:500;transition:color .2s;position:relative}
.nav-item.active{color:var(--purple)}.nav-item svg{width:21px;height:21px}
.nav-badge{position:absolute;top:1px;right:10px;background:var(--red);color:#fff;font-size:9px;min-width:14px;height:14px;border-radius:7px;display:flex;align-items:center;justify-content:center;padding:0 3px}
.page{display:none}.page.active{display:block}
.phdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.phdr h2{font-size:17px;font-weight:700}.phdr-btns{display:flex;gap:8px}
.btn-add{border:none;padding:7px 14px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer}
.btn-primary{background:var(--purple);color:#fff}.btn-secondary{background:rgba(255,255,255,.06);color:var(--dim)}
.wl-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center}
.wl-word{font-size:14px;font-weight:700}.wl-ph{font-size:11px;color:var(--dim);margin-left:5px}
.wl-mean{font-size:12px;color:var(--dim);margin-top:2px}.wl-right{display:flex;align-items:center;gap:7px}
.wl-lv{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:700}
.lv-0{background:var(--pdim);color:var(--purple)}.lv-1{background:rgba(250,204,21,.1);color:var(--yellow)}.lv-2{background:var(--gdim);color:var(--green)}
.wl-del{background:none;border:none;color:var(--dim);cursor:pointer;font-size:15px;padding:2px 4px}.wl-del:hover{color:var(--red)}
.empty{text-align:center;padding:50px 16px;color:var(--dim)}.empty .ic{font-size:42px;margin-bottom:10px}
.modal-ov{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.65);align-items:center;justify-content:center;padding:16px}
.modal-ov.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:22px;width:100%;max-width:440px;max-height:85vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:700;margin-bottom:14px}
.modal label{display:block;font-size:11px;font-weight:700;color:var(--dim);margin-bottom:4px;margin-top:10px}
.modal input,.modal textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;font-family:inherit}
.modal input:focus,.modal textarea:focus{border-color:var(--purple)}.modal textarea{min-height:60px;resize:vertical}
.modal .hint{font-size:10px;color:var(--dim);margin-top:3px;line-height:1.5}
.modal-btns{display:flex;gap:9px;margin-top:16px}.modal-btns button{flex:1;padding:11px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer}
.mb-cancel{background:var(--bg);color:var(--dim)}.mb-submit{background:var(--purple);color:#fff}
.import-area{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;min-height:140px;resize:vertical;line-height:1.6}
.import-area:focus{border-color:var(--purple)}
.import-fmt{background:var(--bg);border-radius:10px;padding:12px;margin-top:10px;font-size:11px;color:var(--dim);line-height:1.7}
.import-fmt code{color:var(--purple);background:rgba(167,139,250,.1);padding:0 4px;border-radius:3px}
.import-msg{font-size:12px;margin-top:8px;padding:8px 12px;border-radius:8px;display:none}
.import-msg.ok{display:block;background:var(--gdim);color:var(--green)}
.import-msg.err{display:block;background:var(--rdim);color:var(--red)}
.review-hero{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:24px;text-align:center;margin-bottom:16px}
.review-hero .rn{font-size:48px;font-weight:900;color:var(--yellow);line-height:1}
.review-hero .rt{color:var(--dim);font-size:13px;margin-top:4px}
.btn-start{margin-top:14px;width:100%;padding:14px;border:none;border-radius:13px;background:linear-gradient(135deg,var(--purple),#c084fc);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.cal-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px}
.cal-title{font-size:13px;font-weight:600;margin-bottom:10px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center}
.cal-hdr{font-size:10px;color:var(--dim);padding:3px}
.cal-day{aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--dim)}
.cal-day.done{background:var(--gdim);color:var(--green);font-weight:700}.cal-day.today{border:1px solid var(--purple)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .28s ease-out}
@keyframes slideOutL{to{opacity:0;transform:translateX(-30px) scale(.96)}}
@keyframes slideOutR{to{opacity:0;transform:translateX(30px) scale(.96)}}
.slide-out-l{animation:slideOutL .18s ease-in forwards}.slide-out-r{animation:slideOutR .18s ease-in forwards}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
</style>
</head>
<body>
<script src="supabase.js"></script>
<script src="app.js"></script>
<div class="app">
  <div class="topbar"><div class="logo"><b>V</b>ocabLift</div><span class="streak" id="streakBadge">🔥 0天</span></div>
  <div class="stats">
    <div class="stat s-total"><div class="v" id="statTotal">0</div><div class="l">词库</div></div>
    <div class="stat s-due"><div class="v" id="statDue">0</div><div class="l">待复习</div></div>
    <div class="stat s-done"><div class="v" id="statDone">0</div><div class="l">今日完成</div></div>
  </div>
  <div class="page active" id="pageCard">
    <div class="prog"><div class="prog-top"><span>进度</span><span id="progFrac">0/0</span></div><div class="prog-track"><div class="prog-fill" id="progFill" style="width:0"></div></div></div>
    <div id="cardArea"></div>
    <div class="judge-row" id="judgeRow" style="display:none">
      <button class="judge-btn btn-hard" onclick="judge(false)">😅 没想起来</button>
      <button class="judge-btn btn-good" onclick="judge(true)">😎 记住了</button>
    </div>
    <div id="completeArea"></div>
  </div>
  <div class="page" id="pageReview">
    <div class="review-hero">
      <div class="rn" id="reviewNum">0</div>
      <div class="rt">个单词今天需要复习</div>
      <button class="btn-start" onclick="startReview()">开始复习 ✏️</button>
    </div>
    <div class="cal-card" id="calArea"></div>
  </div>
  <div class="page" id="pageList">
    <div class="phdr"><h2>我的词库</h2><div class="phdr-btns">
      <button class="btn-add btn-secondary" onclick="showImport()">📥 导入</button>
      <button class="btn-add btn-primary" onclick="showAdd()">＋ 添加</button>
    </div></div>
    <div id="listArea"></div>
  </div>
</div>
<nav class="bottom-nav">
  <button class="nav-item active" onclick="goPage('card',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="3"/><path d="M8 10h8M8 14h5"/></svg>背单词</button>
  <button class="nav-item" onclick="goPage('review',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>复习<span class="nav-badge" id="reviewBadge" style="display:none">0</span></button>
  <button class="nav-item" onclick="goPage('list',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>词库</button>
</nav>
<div class="modal-ov" id="addModal"><div class="modal">
  <h3>添加新单词</h3>
  <label>英文单词</label><input type="text" id="inpWord" placeholder="achieve">
  <label>音标（可选）</label><input type="text" id="inpPhonetic" placeholder="/əˈtʃiːv/">
  <label>意大利语释义</label><input type="text" id="inpMeaning" placeholder="raggiungere, realizzare">
  <label>例句1（用{{}}包住目标单词）</label><textarea id="inpSent1" placeholder="She finally {{achieve}}d her dream."></textarea>
  <label>例句2（可选）</label><textarea id="inpSent2" placeholder="The team {{achieve}}d excellent results."></textarea>
  <div class="modal-btns"><button class="mb-cancel" onclick="hideAdd()">取消</button><button class="mb-submit" onclick="submitAdd()">添加</button></div>
</div></div>
<div class="modal-ov" id="importModal"><div class="modal">
  <h3>批量导入单词</h3>
  <label>粘贴单词数据</label>
  <textarea class="import-area" id="importArea" placeholder="粘贴到这里..."></textarea>
  <div class="import-fmt">
    <b>格式（每行一个单词）：</b><br>
    <code>单词 | 意大利语释义 | 例句1 | 例句2（可选）</code><br><br>
    示例：<br>
    <code>improve | migliorare | We need to {{improve}} our service. | Her English has improved a lot.</code><br><br>
    如果例句中没有{{}}，系统会自动识别并包裏目标单词。
  </div>
  <div class="import-msg" id="importMsg"></div>
  <div class="modal-btns"><button class="mb-cancel" onclick="hideImport()">取消</button><button class="mb-submit" onclick="doImport()">导入</button></div>
</div></div>
</body>
</html>
